# Offline demo suite (SQLite, no credentials) — a runnable example for the app.
# Uses the seeded sample data under samples/data (built by samples/build_demo.py).
scenario: medallion_data_migration
connections: config/connections.yaml
mapping: config/mappings/demo.json
source: demo_source
target: demo_target

options:
  variance_threshold: 0.0001
  lineage_columns: [SOURCE_SYSTEM, LOAD_TIMESTAMP]

tests:
  - row_count
  - schema
  - datatype
  - completeness
  - business_rules
  - referential_integrity
  - transformation
  - deduplication
  - null_handling
  - reconciliation
  - lineage

tables:
  - name: DEAL_FUND_VALUED_ASSET
    options:
      group_by: [FUND_CODE]
      null_not_zero: [FMV]
      completeness:
        - column: PERIOD
          expected_values: ["2026Q1"]
  - name: FUND
    options:
      lineage_columns: []
