# HOP: SILVER -> GOLD (business-ready layer)
scenario: medallion_data_migration
connections: config/connections.yaml
mapping: config/mappings/valdb_mapping.xlsx
source: snowflake_silver
target: snowflake_gold

options:
  variance_threshold: 0.0001
  lineage_columns: [SOURCE_SYSTEM, LOAD_TIMESTAMP, BATCH_ID]

tests: [row_count, schema, datatype, completeness, business_rules,
        referential_integrity, transformation, historical, deduplication,
        null_handling, reconciliation, lineage, incremental]

